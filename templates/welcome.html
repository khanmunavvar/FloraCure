<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | FloraCure</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen bg-cover bg-center bg-no-repeat" style="background-image: url('/static/image/forest.jpeg');">
  <div class="min-h-screen w-full flex items-center justify-center backdrop-blur-sm bg-black/30 px-4">
    <div class="text-center max-w-lg w-full">
      <div class="mb-4 flex justify-center">
        <img src="/static/image/fc.png" alt="FloraCure Logo" class="h-20 w-20 rounded-full shadow-2xl border-4 border-white/30">
      </div>
      <h1 class="text-4xl sm:text-5xl font-black italic text-green-100 mb-2 drop-shadow-lg">FloraCure</h1>
      <p class="italic text-sm sm:text-base text-green-200 mb-10 leading-relaxed">
        "Your AI-powered plant doctor — diagnose, treat, and track your plants."
      </p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="{% url 'login' %}"
           class="bg-gradient-to-r from-emerald-500 to-emerald-700 hover:from-emerald-600 hover:to-emerald-800
                  text-white font-bold px-10 py-3 rounded-full shadow-lg transition transform hover:scale-105 text-center">
          Login
        </a>
        <a href="{% url 'register' %}"
           class="bg-white/20 hover:bg-white/30 border border-white/40 backdrop-blur-sm
                  text-white font-bold px-10 py-3 rounded-full shadow-lg transition transform hover:scale-105 text-center">
          Register
        </a>
      </div>
    </div>
  </div>
</body>
</html>
