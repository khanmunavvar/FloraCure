<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | FloraCure</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen bg-cover bg-center bg-no-repeat" style="background-image: url('/static/image/forest.jpeg');">
  <div class="min-h-screen w-full bg-black/20 flex items-center justify-center backdrop-blur-lg px-4 py-8">
    <div class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-6 sm:p-8 w-full max-w-md border border-white/20">

      <!-- Logo & Title -->
      <div class="text-center mb-6">
        <img src="/static/image/fc.png" alt="Logo" class="h-14 w-14 mx-auto mb-3 rounded-full border-2 border-white/30">
        <h1 class="text-3xl font-bold text-green-100 text-center italic">FloraCure</h1>
        <p class="text-green-200 text-sm mt-1 italic">Create your account to enter the world of plant care</p>
      </div>

      <!-- Error -->
      {% if error %}
      <div class="bg-red-500/20 border border-red-400/40 text-red-100 font-semibold py-2 px-4 rounded-xl mb-5 text-center text-sm">
        ⚠️ {{ error }}
      </div>
      {% endif %}

      <!-- Form -->
      <form method="POST" action="{% url 'register' %}" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-green-100 text-sm mb-1 font-semibold">Full Name</label>
          <input type="text" name="full_name" required autofocus
                 class="w-full px-4 py-2.5 rounded-xl bg-white/20 text-white placeholder-green-300 border border-white/20
                        focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
                 placeholder="Your full name">
        </div>
        <div>
          <label class="block text-green-100 text-sm mb-1 font-semibold">Email</label>
          <input type="email" name="email" required
                 class="w-full px-4 py-2.5 rounded-xl bg-white/20 text-white placeholder-green-300 border border-white/20
                        focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
                 placeholder="your@email.com">
        </div>
        <div>
          <label class="block text-green-100 text-sm mb-1 font-semibold">Password</label>
          <input type="password" name="password" required
                 class="w-full px-4 py-2.5 rounded-xl bg-white/20 text-white placeholder-green-300 border border-white/20
                        focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"
                 placeholder="Choose a strong password">
        </div>
        <button type="submit"
                class="w-full bg-gradient-to-r from-emerald-500 to-emerald-700 hover:from-emerald-600 hover:to-emerald-800
                       text-white font-bold py-3 rounded-xl shadow-lg transition transform hover:scale-[1.02] mt-2">
          Create Account →
        </button>
      </form>

      <p class="text-green-100 text-sm text-center mt-5">
        Already have an account?
        <a href="{% url 'login' %}" class="underline hover:text-green-300 font-semibold">Sign in</a>
      </p>
    </div>
  </div>
</body>
</html>
